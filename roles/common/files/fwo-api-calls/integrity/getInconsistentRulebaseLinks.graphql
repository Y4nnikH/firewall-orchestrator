query getInconsistentRulebaseLinks {
  rulebase_link(
    where: {
      removed: { _is_null: true }
      _or: [
        { rule: { removed: { _is_null: false } } }
        { rulebase: { removed: { _is_null: false } } }
        { rulebaseByFromRulebaseId: { removed: { _is_null: false } } }
      ]
    }
    order_by: { id: asc }
  ) {
    id
    gw_id
    from_rule_id
    from_rulebase_id
    to_rulebase_id
    removed
    rule {
      removed
    }
    rulebase {
      removed
    }
    rulebaseByFromRulebaseId {
      removed
    }
  }
}
