mutation updateWorkflowVisibilityGroup($id: Int!, $name: String!, $description: String, $isActive: Boolean!) {
  update_visibility_group: update_request_workflow_visibility_group_by_pk(
    pk_columns: {id: $id}
    _set: {name: $name, description: $description, is_active: $isActive}
  ) {
    updatedId: id
  }
}
