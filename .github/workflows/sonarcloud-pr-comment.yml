name: SonarCloud PR Comment

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Validate /sonar request
    if: ${{ github.event.issue.pull_request && startsWith(github.event.comment.body, '/sonar') }}
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.permission.outputs.allowed }}
      permission: ${{ steps.permission.outputs.permission }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
      pr_head_repo: ${{ steps.pr.outputs.pr_head_repo }}
      pr_head_ref: ${{ steps.pr.outputs.pr_head_ref }}
      pr_head_sha: ${{ steps.pr.outputs.pr_head_sha }}
      pr_base_ref: ${{ steps.pr.outputs.pr_base_ref }}
      pr_url: ${{ steps.pr.outputs.pr_url }}
    steps:
      - name: Read pull request metadata
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            core.setOutput('pr_number', String(pr.number));
            core.setOutput('pr_head_repo', pr.head.repo.full_name);
            core.setOutput('pr_head_ref', pr.head.ref);
            core.setOutput('pr_head_sha', pr.head.sha);
            core.setOutput('pr_base_ref', pr.base.ref);
            core.setOutput('pr_url', pr.html_url);

      - name: Check commenter permission
        id: permission
        uses: actions/github-script@v8
        with:
          script: |
            const username = context.payload.comment.user.login;
            let permission = 'none';

            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username
              });
              permission = data.permission;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const allowed = ['admin', 'maintain', 'write'].includes(permission);
            core.setOutput('permission', permission);
            core.setOutput('allowed', allowed ? 'true' : 'false');

      - name: Reject unauthorized trigger
        if: ${{ steps.permission.outputs.allowed != 'true' }}
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Skipping \`/sonar\`: @${context.payload.comment.user.login} has \`${{ steps.permission.outputs.permission }}\` repository permission. Required: \`write\`, \`maintain\`, or \`admin\`.`
            });

  analyze:
    name: Analyze fork PR
    needs: prepare
    if: ${{ needs.prepare.outputs.allowed == 'true' }}
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
    steps:
      - name: Acknowledge scan request
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ needs.prepare.outputs.pr_number }}'),
              body: `Running SonarCloud analysis for commit \`${{ needs.prepare.outputs.pr_head_sha }}\` from \`${{ needs.prepare.outputs.pr_head_repo }}\` at the request of @${context.payload.comment.user.login}.`
            });

      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.prepare.outputs.pr_head_repo }}
          ref: ${{ needs.prepare.outputs.pr_head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: dotnet tool update dotnet-sonarscanner --tool-path .sonar/scanner

      - name: Build and analyze pull request
        run: |
          .sonar/scanner/dotnet-sonarscanner begin \
            /k:"${SONAR_PROJECT_KEY}" \
            /o:"${SONAR_ORGANIZATION}" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.pullrequest.key="${{ needs.prepare.outputs.pr_number }}" \
            /d:sonar.pullrequest.branch="${{ needs.prepare.outputs.pr_head_ref }}" \
            /d:sonar.pullrequest.base="${{ needs.prepare.outputs.pr_base_ref }}"
          dotnet build roles/FWO.sln --configuration Debug --no-incremental
          .sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${SONAR_TOKEN}"

      - name: Comment result link
        if: ${{ success() }}
        uses: actions/github-script@v8
        with:
          script: |
            const dashboardUrl = `https://sonarcloud.io/dashboard?id=${process.env.SONAR_PROJECT_KEY}&pullRequest=${{ needs.prepare.outputs.pr_number }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ needs.prepare.outputs.pr_number }}'),
              body: `SonarCloud analysis finished successfully for this PR: ${dashboardUrl}`
            });

      - name: Comment failure
        if: ${{ failure() }}
        uses: actions/github-script@v8
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ needs.prepare.outputs.pr_number }}'),
              body: `SonarCloud analysis failed for this PR. Workflow run: ${runUrl}`
            });
